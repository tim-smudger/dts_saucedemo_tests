on:
  push:
    branches: [main, master, expand-login-and-accessibility-tests]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  functional-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run functional tests
        run: npm run test:functional
        env:
          ENV: production
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          PASSWORD_FOR_ALL: ${{ secrets.PASSWORD_FOR_ALL }}
          LOCKED_USER: ${{ secrets.LOCKED_USER }}
          TIMEOUT_TEST_USER: ${{ secrets.TIMEOUT_TEST_USER }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-functional
          path: playwright-report/
          retention-days: 30

  accessibility-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run accessibility scans (desktop + mobile)
        run: npm run test:a11y
        env:
          ENV: production
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          PASSWORD_FOR_ALL: ${{ secrets.PASSWORD_FOR_ALL }}
          LOCKED_USER: ${{ secrets.LOCKED_USER }}
          TIMEOUT_TEST_USER: ${{ secrets.TIMEOUT_TEST_USER }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-accessibility
          path: playwright-report/
          retention-days: 30

  # Publish the HTML reports to GitHub Pages. Runs only on pushes to main, and
  # even if the test jobs failed (you still want to see the failing report).
  # One-time setup: in repo Settings → Pages, set the source to "GitHub Actions".
  publish-report:
    needs: [functional-tests, accessibility-tests]
    if: ${{ always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/expand-login-and-accessibility-tests') }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download functional report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-functional
          path: site/functional
      - name: Download accessibility report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-accessibility
          path: site/accessibility
      - name: Create landing page
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>SauceDemo test reports</title>
            </head>
            <body>
              <h1>SauceDemo test reports</h1>
              <ul>
                <li><a href="./functional/">Functional report</a></li>
                <li><a href="./accessibility/">Accessibility report</a></li>
              </ul>
            </body>
          </html>
          HTML
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
