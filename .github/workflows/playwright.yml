on:
  push:
    branches: [main, master, gh_actions]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  functional-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run functional tests
        run: npm run test:functional
        env:
          ENV: production
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          PASSWORD_FOR_ALL: ${{ secrets.PASSWORD_FOR_ALL }}
          LOCKED_USER: ${{ secrets.LOCKED_USER }}
          TIMEOUT_TEST_USER: ${{ secrets.TIMEOUT_TEST_USER }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-functional
          path: playwright-report/
          retention-days: 30

  accessibility-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run accessibility scans (desktop + mobile)
        run: npm run test:a11y
        env:
          ENV: production
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          PASSWORD_FOR_ALL: ${{ secrets.PASSWORD_FOR_ALL }}
          LOCKED_USER: ${{ secrets.LOCKED_USER }}
          TIMEOUT_TEST_USER: ${{ secrets.TIMEOUT_TEST_USER }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-accessibility
          path: playwright-report/
          retention-days: 30
